<!DOCTYPE html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forlaget Plenum</title>
    <style>
      @font-face {
        font-family: "Newsreader";
        src: url("fonts/Newsreader-VariableFont_opsz,wght.ttf")
          format("truetype-variations");
        font-weight: 200 600;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Newsreader";
        src: url("fonts/Newsreader-Italic-VariableFont_opsz,wght.ttf")
          format("truetype-variations");
        font-weight: 200 600;
        font-style: italic;
        font-display: swap;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Newsreader";
        font-weight: 200;
        line-height: 1.4;
        color: #fff;
        padding: 0px;
        background-color: #00bd3a;
        background-image: url("logo.svg");
        background-position: calc(100% + 2vw) calc(100% + 2vw);
        background-repeat: no-repeat;
        background-size: 30vw;
      }

      .container {
        max-width: 1000px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
      }

      h1 {
        font-weight: 200;
        font-size: 2em;
        line-height: 1.2em;
      }

      p {
        font-size: 1.5em;
        margin-bottom: 0.4em;
      }

      strong {
        font-weight: 600;
      }

      main {
        padding: 20px 0;

        opacity: 0;
        transition: opacity 1s ease-in;
      }
      .columns {
        columns: 2 300px;
        column-gap: 40px;
        margin-bottom: 20px;
      }

      main.fade-in {
        opacity: 1;
      }
      .links {
        padding: 10px 0 0 0;
      }

      .links a {
        font-size: 2em;
        color: #fff;
        border-radius: 10px;
        display: inline-flex;
        padding: 12px 20px 10px 20px;
        font-size: 1.4em;
        text-align: center;
        width: 320px;
        background-color: #03643970;
        text-decoration: none;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        transition: background-color 0.5s;
        margin-bottom: 10px;
      }
      .links a:hover {
        background-color: #036439;
      }
      .links a svg {
        margin-top: -2px;
        transition: transform 0.5s;
      }

      .links a:hover svg {
        transform: translateX(10px);
      }

      @media (min-width: 800px) {
        h1 {
          font-size: 2em;
        }
        .links {
          display: flex;
          align-items: center;
          justify-content: space-around;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1><span id="typed"></span></h1>
      </header>

    </div>

    <script src="https://unpkg.com/typed.js@2.1.0/dist/typed.umd.js"></script>
    <script>
      var typed = new Typed("#typed", {
        strings: [
          "Der er noget nyt på vej...",
        ],
        typeSpeed: 50,
        backSpeed: 30,
        loop: false,
        showCursor: true,
        cursorChar: "|",
        /* onComplete: function (self) {
          // Hide cursor after typing completes
          self.cursor.style.display = "none";
          // Fade in the main element after typing completes
          document.querySelector("main").classList.add("fade-in");
        }, */
      });
    </script>
  </body>
</html>
